workflows:
  ios-release:
    name: Build iOS IPA
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Clean Build Workspace
        script: |
          flutter clean
          rm -rf ios/Podfile.lock ios/Pods
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build iOS App
        script: flutter build ipa --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa