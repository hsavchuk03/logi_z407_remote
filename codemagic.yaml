workflows:
  ios-release:
    name: Build iOS IPA
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Clean Build Workspace
        script: |
          flutter clean
          rm -rf ios/Podfile.lock ios/Pods
      - name: Get Flutter packages
        script: flutter pub get
      - name: Set iOS 13.0 Deployment Target
        script: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g' ios/Runner.xcodeproj/project.pbxproj
      - name: Build Unsigned iOS App
        script: |
          flutter build ios --release --no-codesign
          mkdir -p build/ios/iphoneos/Payload
          mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos && zip -qr Z407Remote.ipa Payload
    artifacts:
      - build/ios/iphoneos/Z407Remote.ipa