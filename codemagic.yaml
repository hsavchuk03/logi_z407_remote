workflows:
  ios-release:
    name: Build iOS IPA
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Clean build workspace
        script: |
          flutter clean
          rm -rf ios/Podfile.lock ios/Pods

      - name: Get Flutter packages
        script: flutter pub get

      - name: Set iOS deployment target
        script: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Set bundle identifier
        script: |
          sed -i '' 's/com\.example\.logiZ407Remote/com.harry.z407remote/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Build signed IPA
        script: |
          flutter build ios --release
          xcodebuild -workspace ios/Runner.xcworkspace -scheme Runner -configuration Release -archivePath build/ios/archive/Runner.xcarchive -allowProvisioningUpdates archive
          xcodebuild -exportArchive -archivePath build/ios/archive/Runner.xcarchive -exportPath build/ios/ipa -exportOptionsPlist ios/ExportOptions.plist -allowProvisioningUpdates

    artifacts:
      - build/ios/ipa/*.ipa