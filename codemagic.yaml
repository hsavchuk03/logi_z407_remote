workflows:
  ios-release:
    name: Build iOS IPA
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Clean Build Workspace
        script: |
          flutter clean
          rm -rf ios/Podfile.lock ios/Pods
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Unsigned iOS App
        script: |
          # 1. Build the raw .app binary (bypasses the strict archive export)
          flutter build ios --release --no-codesign
          
          # 2. Manually package it into a Sideloadly-ready .ipa
          cd build/ios/iphoneos
          mkdir -p Payload
          mv Runner.app Payload/
          zip -qr Z407Remote.ipa Payload
    artifacts:
      # Grab the newly created zip file
      - build/ios/iphoneos/*.ipa