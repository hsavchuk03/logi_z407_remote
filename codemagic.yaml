workflows:
  ios-build:
    name: Flutter iOS unsigned IPA
    instance_type: macos_m1
    max_build_duration: 60
    environment:
      xcode: latest
      flutter: stable
      vars:
        APP_ID: com.example.logiZ407Remote
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install Flutter dependencies
        script: |
          flutter pub get
      - name: Build unsigned IPA
        script: |
          flutter build ios --release --no-codesign
          mkdir -p build/ios/ipa
          xcodebuild -workspace ios/Runner.xcworkspace -scheme Runner -configuration Release -sdk iphoneos -derivedDataPath build/ios/iphoneos -allowProvisioningUpdates archive -archivePath build/ios/Runner.xcarchive
          xcodebuild -exportArchive -archivePath build/ios/Runner.xcarchive -exportOptionsPlist ios/ExportOptions.plist -exportPath build/ios/ipa
    artifacts:
      - build/ios/ipa/*.ipa
