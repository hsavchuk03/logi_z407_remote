workflows:
  ios-release:
    name: Build iOS IPA
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Clean Build Workspace
        script: |
          flutter clean
          rm -rf ios/Podfile.lock ios/Pods
      - name: Get Flutter packages
        script: flutter pub get
      - name: Set iOS 13.0 Deployment Target
        script: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g' ios/Runner.xcodeproj/project.pbxproj
      - name: Hardcode Bundle Identifier
        script: |
          # Replaces Xcode's raw variables and the com.example block with a hardcoded, SideStore-safe ID
          sed -i '' 's/$(PRODUCT_BUNDLE_IDENTIFIER)/com.harry.z407remote/g' ios/Runner/Info.plist
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = .*/PRODUCT_BUNDLE_IDENTIFIER = com.harry.z407remote;/g' ios/Runner.xcodeproj/project.pbxproj
      - name: Prepare Export Options
        script: |
          if [ -n "$TEAM_ID" ]; then
            sed -i '' "s#<string></string>#<string>$TEAM_ID</string>#g" ios/ExportOptions.plist
          fi
      - name: Build Signed iOS IPA
        script: |
          flutter build ipa --export-options-plist=ios/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa