workflows:
  ios-release:
    name: Build iOS IPA
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Clean build workspace
        script: |
          flutter clean
          rm -rf ios/Podfile.lock ios/Pods

      - name: Get Flutter packages
        script: flutter pub get

      - name: Set iOS deployment target
        script: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Set bundle identifier
        script: |
          sed -i '' 's/com\.example\.logiZ407Remote/com.harry.z407remote/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/$(PRODUCT_BUNDLE_IDENTIFIER)/com.harry.z407remote/g' ios/Runner/Info.plist
          sed -i '' 's/$(EXECUTABLE_NAME)/Runner/g' ios/Runner/Info.plist

      - name: Build unsigned IPA
        script: |
          flutter build ios --release --no-codesign

          if [ -d "build/ios/iphoneos/Runner.app/Frameworks" ]; then
            for framework in build/ios/iphoneos/Runner.app/Frameworks/*.framework; do
              binary_name=$(basename "$framework" .framework)
              if [ -f "$framework/$binary_name" ]; then
                codesign --force --deep --sign - --preserve-metadata=identifier,flags --timestamp=none "$framework/$binary_name"
              fi
            done
          fi

          codesign --force --deep --sign - --preserve-metadata=identifier,flags --timestamp=none build/ios/iphoneos/Runner.app

          mkdir -p build/ios/iphoneos/Payload
          rm -rf build/ios/iphoneos/Payload/Runner.app
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/Runner.app
          ditto -c -k --sequesterRsrc --keepParent build/ios/iphoneos/Payload build/ios/iphoneos/Z407Remote.ipa

    artifacts:
      - build/ios/iphoneos/Z407Remote.ipa